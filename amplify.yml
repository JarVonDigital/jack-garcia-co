version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/jack-garcia-co/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  runtime-versions:
        nodejs: 20
